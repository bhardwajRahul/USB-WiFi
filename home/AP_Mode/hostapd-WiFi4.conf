# /etc/hostapd/hostapd-WiFi4.conf
# Documentation: https://w1.fi/cgit/hostap/plain/hostapd/hostapd.conf
# 2026-07-12
# Status: stable
# Purpose: example hostapd.conf for mt76 and rtw88 based USB WiFi
#          adapters for WiFi 4 using band 1 (2.4 GHz) or band 2 (5 GHz)..
# Default: band 1, 20 MHz channel width and WPA2.
# Future: add details for rtw89 adapters.

# Tested with the mt76 and rtw88 in-kernel drivers using kernel 6.18.
# Recommend that USB2 ports are used for WiFi 4.

# Requirements for ht (WiFi 4) operation:
# ieee80211n=1
# wmm_enabled=1

# Information:
# - tested on RasPi4B with 64 bit RasPiOS
# - suggested improvements to this document are welcome

# SSID
ssid=WiFi4
# PASSPHRASE
wpa_passphrase=myPW1234
# Band: a = 5GHz & 6GHz (a/n/ac/ax/be), g = 2Ghz (b/g/n/be)
hw_mode=g
#hw_mode=a
# Channel availability varies by country
# https://en.wikipedia.org/wiki/List_of_WLAN_channels
# 2.4 GHz (channels 1, 6 and 11 are available worldwide)
# 5 GHz (channel 36 is generally available)
# Channel
channel=11
#channel=36
# Country code
# https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2
country_code=US
# Enable 802.11d to actively broadcast the country code to clients
ieee80211d=1
# Set hostapd driver (nl80211 is used with all Linux mac80211 drivers)
driver=nl80211
# Bridge interface (not required for routed configurations)
bridge=br0
# WiFi interface (wlan0 should be changed to your interface name)
interface=wlan0

# hostapd event logger configuration
#
# Module bitfield (ORed bitfield of modules that will be logged; -1 = all
# modules):
# bit 0 (1) = IEEE 802.11
# bit 1 (2) = IEEE 802.1X
# bit 2 (4) = RADIUS
# bit 3 (8) = WPA
# bit 4 (16) = driver interface
# bit 6 (64) = MLME
#
# Levels (minimum value for logged events):
#  0 = verbose debugging
#  1 = debugging
#  2 = informational messages
#  3 = notification
#  4 = warning
#
logger_syslog=1
logger_syslog_level=2
#
# Control interface - (i.e. for hostapd_cli)
ctrl_interface=/var/run/hostapd
ctrl_interface_group=0

# Various settings
#beacon_int=100
#dtim_period=2
#rts_threshold=2347
#fragm_threshold=2346
disassoc_low_ack=0
send_probe_response=1
skip_inactivity_poll=1

# Limit number of concurrent "clients" (stations)
max_num_sta=12

# Security
# authentication algorithms (3 = both are allowed, use 3 for SAE otherwise use 1)
auth_algs=1
# MAC address based authentication (0 = accept unless in deny list)
macaddr_acl=0
# hidden SSID (1 = hidden)
ignore_broadcast_ssid=0
# Opportunistic Key Caching (1 = enabled)
#okc=1
# Enable WPA. (2 is required for WPA2, mixed and WPA3)
wpa=2
# Pairwise cipher
rsn_pairwise=CCMP
#rsn_pairwise=CCMP CCMP-256 GCMP GCMP-256
#
# Activate only one of the following 3 sections
#
# Note: WPA2 is likely the best choice as some client devices may not
# support WPA3.
#
# 1. WPA2 Personal
wpa_key_mgmt=WPA-PSK
# wpa_key_mgmt=WPA-PSK WPA-PSK-SHA256
#
# 2. WPA2/WPA3 Transitional (mixed)
# Some older devices may not be compatible with this setting.
#wpa_key_mgmt=SAE WPA-PSK WPA-PSK-SHA256
#ieee80211w=1
#sae_require_mfp=1
#
# 3. WPA3 Personal (required for band 4, 6 GHz)
# Some older devices are not compatible with this setting.
#wpa_key_mgmt=SAE
#ieee80211w=2
#sae_pwe=2

# IEEE 802.11n (WiFi 4) configuration
ieee80211n=1
wmm_enabled=1
#
# Note: Only one ht_capab= line should be active (uncommented). The content
# of these lines is determined by the capabilities of your adapter.
#
# Note: 20 MHz channel width will normally provide more stable results
# on band 1 than 40 MHz channel width, therefore, 20 MHz is recommended.
#
# generic 20 MHz setting
ht_capab=[SHORT-GI-20]
#
# generic 40 MHz setting
#ht_capab=[HT40+][HT40-][SHORT-GI-20][SHORT-GI-40]
#
# RasPi4B internal wifi
# 20 MHz channel width
#ht_capab=[SHORT-GI-20]
# 40 MHz channel width
##ht_capab=[HT40+][HT40-][SHORT-GI-20][SHORT-GI-40][DSSS_CCK-40]
#
# Ralink rt5370 and rt3070
# 20 MHz channel width
#ht_capab=[SHORT-GI-20][RX-STBC1]
# 40 MHz channel width
#ht_capab=[HT40+][HT40-][GF][SHORT-GI-20][SHORT-GI-40][RX-STBC1]
#
# Atheros ar9271
# 20 MHz channel width
#ht_capab=[SHORT-GI-20][RX-STBC1]
# 40 MHz channel width
#ht_capab=[HT40+][HT40-][SHORT-GI-20][SHORT-GI-40][RX-STBC1][DSSS_CCK-40]
#
# Mediatek chipsets
#
# mt7612u and mt7610u - tested on 07-12-2026
# 20 MHz channel width, band 1 (2.4 GHz)
#ht_capab=[SHORT-GI-20][RX-STBC1]
# 40 MHz channel width, band 2 (5 GHz)
#ht_capab=[HT40+][HT40-][GF][SHORT-GI-20][SHORT-GI-40][RX-STBC1]
#
# mt7925u and mt7921au - tested on 07-12-2026
# 20 MHz channel width, band 1 (2.4 GHz)
#ht_capab=[LDPC][SHORT-GI-20][TX-STBC][RX-STBC1][MAX-AMSDU-7935]
# 40 MHz channel width, band 2 (5 GHz)
#ht_capab=[LDPC][HT40+][HT40-][GF][SHORT-GI-20][SHORT-GI-40][TX-STBC][RX-STBC1][MAX-AMSDU-7935]
#
# Realtek chipsets
#
# rtl8812au - rtl8811au - rtl8811cu
# 20 MHz channel width, band 1 (2.4 GHz)
#ht_capab=[SHORT-GI-20][RX-STBC1][MAX-AMSDU-7935]
# 40 MHz channel width, band 2 (5 GHz)
#ht_capab=[HT40+][HT40-][SHORT-GI-20][SHORT-GI-40][RX-STBC1][MAX-AMSDU-7935][DSSS_CCK-40]
#
# rtl8812bu
# 20 MHz channel width, band 1 (2.4 GHz)
#ht_capab=[LDPC][SHORT-GI-20][MAX-AMSDU-7935]
# 40 MHz channel width, band 2 (5 GHz)
#ht_capab=[LDPC][HT40+][HT40-][SHORT-GI-20][SHORT-GI-40][MAX-AMSDU-7935]
#
# rtl8814au - tested on 07-12+-2026
# 20 MHz channel width, band 1 (2.4 GHz)
#ht_capab=[LDPC][SHORT-GI-20][RX-STBC1][MAX-AMSDU-7935]
# 40 MHz channel width, band 2 (5 GHz)
#ht_capab=[LDPC][HT40+][HT40-][SHORT-GI-20][SHORT-GI-40][RX-STBC1][MAX-AMSDU-7935][DSSS_CCK-40]

# IEEE 802.11ac (WiFi 5) configuration
# Note: WiFi 6 is not available on band 1 (2.4 GHz) 
ieee80211ac=0

# IEEE 802.11ax (WiFi 6) configuration
# Note: WiFi 6 is available on band 1 (2.4 GHz) 
# Note: activate only if your adapter and clients supports WiFi 6.
ieee80211ax=0

# End of hostapd-WiFi4.conf
